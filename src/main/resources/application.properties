# ── Server ──────────────────────────────────────────────────────
server.port=8080
spring.application.name=rks-collections

# ── H2 Embedded Database (persisted to disk) ────────────────────
spring.datasource.url=jdbc:h2:file:./data/rksdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=rks
spring.datasource.password=rks@2025
# Let Hibernate auto-detect dialect (removes deprecation warning)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Thymeleaf ────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Static Resources ─────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/

# ── File Upload ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JWT ──────────────────────────────────────────────────────────
app.jwt.secret=RKSCollections2025SuperSecretKeyForJWTMinimum256BitsLongEnoughForSecurity!
app.jwt.expiration=86400000

# ── WhatsApp ─────────────────────────────────────────────────────
app.whatsapp.number=91 9390583701

# ── Default Admin ────────────────────────────────────────────────
app.admin.username=Rksadmin
app.admin.password=RksAdmin@2025
app.admin.email=chr87583@gmail.com

# ── Spring AI - OpenAI ───────────────────────────────────────────
# Add your OpenAI API key below to enable Riya AI assistant
# If not set, the app uses built-in smart responses (no AI needed to run)
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=400

# ── Disable Spring AI autoconfigure if key is not set ────────────
spring.autoconfigure.exclude=

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.rks=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.ai=WARN
logging.level.org.hibernate.SQL=WARN
