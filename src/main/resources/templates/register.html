<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register – RKS Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a96e;--black:#0a0a0a;--dark:#111;--dark2:#1a1a1a;--text:rgba(255,255,255,0.85);--muted:rgba(255,255,255,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:var(--black);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;width:100%;}
.left{background:linear-gradient(135deg,#0a0a0a,#1a1208,#2a1e08);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;position:relative;overflow:hidden;}
.left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(201,169,110,0.1),transparent);}
.left-inner{position:relative;z-index:1;text-align:center;}
.left img{width:140px;margin-bottom:2rem;}
.left h1{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:#fff;line-height:1.1;}
.left h1 em{color:var(--gold);font-style:italic;}
.features{margin-top:2rem;text-align:left;}
.feature{display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;color:rgba(255,255,255,0.6);font-size:0.78rem;}
.feature-dot{width:6px;height:6px;background:var(--gold);flex-shrink:0;}
.right{background:var(--dark);display:flex;align-items:center;justify-content:center;padding:3rem 2rem;overflow-y:auto;}
.form-box{width:100%;max-width:420px;}
.form-box h2{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:400;color:#fff;margin-bottom:0.3rem;}
.sub{color:var(--muted);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2rem;}
.gold-line{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:2rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1.2rem;}
label{display:block;color:var(--gold);font-size:0.63rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:0.45rem;}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:0.85rem 1rem;font-family:'Montserrat',sans-serif;font-size:0.83rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--gold);}
input::placeholder{color:rgba(255,255,255,0.2);}
.btn-gold{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:1rem;font-family:'Montserrat',sans-serif;font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-top:0.5rem;}
.btn-gold:hover{background:var(--gold);color:var(--black);}
.err{background:rgba(220,60,60,0.1);border:1px solid rgba(220,60,60,0.3);color:#e07070;padding:0.8rem 1rem;font-size:0.75rem;margin-bottom:1rem;display:none;}
.link-row{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.75rem;}
.link-row a{color:var(--gold);text-decoration:none;}
@media(max-width:768px){.split{grid-template-columns:1fr;}.left{display:none;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="split">
  <div class="left">
    <div class="left-inner">
      <img src="/images/logo.jpeg" alt="RKS Collections"/>
      <h1>Join <em>RKS</em><br>Collections</h1>
      <div class="features">
        <div class="feature"><div class="feature-dot"></div>Exclusive new arrival alerts</div>
        <div class="feature"><div class="feature-dot"></div>AI fashion assistant – Riya</div>
        <div class="feature"><div class="feature-dot"></div>Instant WhatsApp ordering</div>
        <div class="feature"><div class="feature-dot"></div>Early access to sales</div>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="form-box">
      <h2>Create Account</h2>
      <p class="sub">Join our exclusive community</p>
      <div class="gold-line"></div>
      <div class="err" id="err"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Username *</label>
          <input id="username" type="text" placeholder="yourname"/>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input id="fullName" type="text" placeholder="Your name"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input id="email" type="email" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input id="phone" type="tel" placeholder="+91 98765 43210"/>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input id="password" type="password" placeholder="Min 6 characters"/>
      </div>
      <button class="btn-gold" onclick="doRegister()">Create Account</button>
      <div class="link-row">Already have an account? <a href="/login-page">Sign in</a></div>
    </div>
  </div>
</div>

<script>
async function doRegister() {
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const fullName = document.getElementById('fullName').value.trim();
  const phone    = document.getElementById('phone').value.trim();

  if (!username || !email || !password) { showErr('Username, email and password are required'); return; }
  if (password.length < 6) { showErr('Password must be at least 6 characters'); return; }

  try {
    const res = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, email, password, fullName, phone})
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Registration failed'); return; }

    localStorage.setItem('rks_token', data.token);
    localStorage.setItem('rks_user', JSON.stringify({username:data.username,role:data.role,fullName:data.fullName}));
    window.location.href = '/';
  } catch(e) { showErr('Connection error'); }
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.style.display = 'block';
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });
if(localStorage.getItem('rks_token')) window.location.href='/';
</script>
</body>
</html>
