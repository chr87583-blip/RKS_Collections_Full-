<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login – RKS Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#c9a96e;--black:#0a0a0a;--dark:#111;--dark2:#1a1a1a;--cream:#f8f4ee;--text:rgba(255,255,255,0.85);--muted:rgba(255,255,255,0.4);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:var(--black);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;width:100%;}
.left{background:linear-gradient(135deg,#0a0a0a 0%,#1a1208 50%,#2a1e08 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;position:relative;overflow:hidden;}
.left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(201,169,110,0.1),transparent);}
.left-inner{position:relative;z-index:1;text-align:center;}
.left img{width:160px;margin-bottom:2rem;filter:drop-shadow(0 0 40px rgba(201,169,110,0.3));}
.left h1{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;color:#fff;line-height:1.1;}
.left h1 em{color:var(--gold);font-style:italic;}
.left p{color:var(--muted);font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;margin-top:1rem;}
.deco{position:absolute;border:1px solid rgba(201,169,110,0.1);}
.deco-1{width:250px;height:250px;top:2rem;left:2rem;border-right:none;border-bottom:none;}
.deco-2{width:200px;height:200px;bottom:2rem;right:2rem;border-left:none;border-top:none;}
.right{background:var(--dark);display:flex;align-items:center;justify-content:center;padding:3rem 2rem;}
.form-box{width:100%;max-width:400px;}
.form-box h2{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:400;color:#fff;margin-bottom:0.3rem;}
.form-box .sub{color:var(--muted);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:2.5rem;}
.gold-line{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:2.5rem;}
.form-group{margin-bottom:1.4rem;}
label{display:block;color:var(--gold);font-size:0.65rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:0.5rem;}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:0.9rem 1rem;font-family:'Montserrat',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--gold);}
input::placeholder{color:rgba(255,255,255,0.25);}
.btn-gold{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:1rem;font-family:'Montserrat',sans-serif;font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;margin-top:0.5rem;}
.btn-gold:hover{background:var(--gold);color:var(--black);}
.err{background:rgba(220,60,60,0.1);border:1px solid rgba(220,60,60,0.3);color:#e07070;padding:0.8rem 1rem;font-size:0.78rem;margin-bottom:1.2rem;display:none;}
.link-row{text-align:center;margin-top:1.8rem;color:var(--muted);font-size:0.75rem;}
.link-row a{color:var(--gold);text-decoration:none;}
.loading{opacity:0.6;pointer-events:none;}
@media(max-width:768px){.split{grid-template-columns:1fr;}.left{display:none;}.right{padding:2rem 1.5rem;}}
</style>
</head>
<body>
<div class="split">
  <div class="left">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="left-inner">
      <img src="/images/logo.jpeg" alt="RKS Collections"/>
      <h1>Welcome to<br><em>RKS Collections</em></h1>
      <p>Premium Ethnic Wear · Est. 2020</p>
    </div>
  </div>
  <div class="right">
    <div class="form-box">
      <h2>Sign In</h2>
      <p class="sub">Access your account</p>
      <div class="gold-line"></div>
      <div class="err" id="err"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
      </div>
      <button class="btn-gold" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="link-row">
        Don't have an account? <a href="/register-page">Create one</a>
      </div>
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('err');
  const btn = document.getElementById('loginBtn');

  if (!username || !password) { showErr('Please fill in all fields'); return; }

  btn.textContent = 'Signing in…';
  btn.classList.add('loading');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Login failed'); return; }

    localStorage.setItem('rks_token', data.token);
    localStorage.setItem('rks_user', JSON.stringify({
      username: data.username, role: data.role, fullName: data.fullName
    }));
    window.location.href = '/';
  } catch(e) {
    showErr('Connection error. Is the server running?');
  } finally {
    btn.textContent = 'Sign In';
    btn.classList.remove('loading');
  }
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
// Redirect if already logged in
if(localStorage.getItem('rks_token')) window.location.href='/';
</script>
</body>
</html>
