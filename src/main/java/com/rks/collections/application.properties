# ── Server ──────────────────────────────────────────────────────
server.port=8080
spring.application.name=rks-collections

# ── H2 Embedded Database ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/rksdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=rks
spring.datasource.password=rks@2025
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Thymeleaf ────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Static Resources ─────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/

# ── File Upload ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JWT ──────────────────────────────────────────────────────────
app.jwt.secret=RKSCollections2025SuperSecretKeyForJWTMinimum256BitsLongEnoughForSecurity!
app.jwt.expiration=86400000

# ── WhatsApp ─────────────────────────────────────────────────────
app.whatsapp.number=919876543210

# ── Default Admin ────────────────────────────────────────────────
app.admin.username=admin
app.admin.password=Admin@2025
app.admin.email=admin@rkscollections.com

# ── Spring AI — disable autoconfigure so app starts without OpenAI key ──
# To enable AI: set OPENAI_API_KEY environment variable on your server/Render
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key-replace-me}
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.rks=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.ai=WARN
logging.level.org.hibernate.SQL=WARN
